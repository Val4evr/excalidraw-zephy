<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Excalidraw / Zephy</title>
  <!--
    Importmap pinned to mcp-app/vite.config.ts. The Vite singlefile build
    inlines our compiled JS but leaves these imports as bare specifiers; the
    browser resolves them via this map.
  -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19.0.0",
      "react-dom": "https://esm.sh/react-dom@19.0.0?deps=react@19.0.0",
      "react-dom/client": "https://esm.sh/react-dom@19.0.0/client?deps=react@19.0.0",
      "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
      "@excalidraw/excalidraw": "https://esm.sh/@excalidraw/excalidraw@0.18.0?deps=react@19.0.0,react-dom@19.0.0",
      "@modelcontextprotocol/ext-apps/react": "https://esm.sh/@modelcontextprotocol/ext-apps@1.7.1/react?deps=react@19.0.0,react-dom@19.0.0,zod@4.4.3",
      "zod": "https://esm.sh/zod@4.4.3",
      "zod/v4": "https://esm.sh/zod@4.4.3/v4"
    }
  }
  </script>
  <!-- Excalidraw 0.18 ships its CSS at dist/prod/index.css; the bare /index.css path 404s on esm.sh. -->
  <link rel="stylesheet" href="https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/prod/index.css" />
  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #ffffff;
      color: #1e1e1e;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #121212; color: #e8e8e8; }
    }
    #root { display: flex; flex-direction: column; min-height: 540px; }
    .placeholder {
      display: flex; flex: 1; align-items: center; justify-content: center;
      padding: 24px; text-align: center; font-size: 14px; line-height: 1.5;
      color: #777;
    }
    .placeholder code {
      font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-size: 13px; padding: 2px 5px; border-radius: 4px;
      background: rgba(127, 127, 127, 0.15);
    }
    .topbar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; font-size: 12px; color: #666;
      border-bottom: 1px solid rgba(127, 127, 127, 0.18);
      background: rgba(127, 127, 127, 0.04);
    }
    .topbar .grow { flex: 1; }
    .topbar a {
      color: inherit; text-decoration: none;
      font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-size: 12px; opacity: 0.85;
    }
    .topbar a:hover { opacity: 1; text-decoration: underline; }
    .canvas-host { flex: 1; min-height: 0; position: relative; }
    .canvas-host > div { height: 100%; }
    .error-banner {
      padding: 8px 12px; background: #fee; color: #900;
      font-size: 13px; border-bottom: 1px solid #fcc;
    }
    @media (prefers-color-scheme: dark) {
      .error-banner { background: #4a1a1a; color: #ffb3b3; border-color: #6a2a2a; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="placeholder" id="boot-placeholder">
      Loading canvas runtime from esm.sh…
    </div>
  </div>
  <!--
    Defensive surface for boot-time errors: if a module import is blocked by
    CSP, fails CORS, or throws synchronously, the React app never mounts and
    the user just sees the static placeholder forever. Capture those errors
    and display them in-page so we don't always need DevTools to diagnose.
  -->
  <script>
    (function () {
      var ph = document.getElementById('boot-placeholder');
      function showError(prefix, detail) {
        if (!ph) return;
        ph.innerHTML =
          '<div style="text-align:left;max-width:640px;font:13px ui-monospace,Menlo,monospace;padding:16px">' +
          '<div style="font-weight:600;color:#c33;margin-bottom:8px">' + prefix + '</div>' +
          '<div style="white-space:pre-wrap;word-break:break-word">' + detail + '</div>' +
          '</div>';
      }
      window.addEventListener('error', function (e) {
        var src = e.filename || (e.target && (e.target.src || e.target.href)) || '(unknown source)';
        showError('Boot error', (e.message || '(no message)') + '\n@ ' + src);
      }, true);
      window.addEventListener('unhandledrejection', function (e) {
        var msg = e.reason && (e.reason.message || String(e.reason)) || '(no reason)';
        showError('Unhandled promise rejection', msg);
      });
      // 8s watchdog — if useApp never reports connected and no canvas appears,
      // surface that so we can distinguish "host never sent us anything" from
      // "import failed".
      setTimeout(function () {
        if (!ph || !document.body.contains(ph)) return;
        if (ph.textContent.indexOf('Loading canvas runtime') === 0) {
          showError(
            'Stuck loading',
            'No React mount + no error after 8s. Likely the bundled JS module ' +
            'failed to load. Check the network tab for blocked requests to esm.sh.'
          );
        }
      }, 8000);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
