# Self-hosted Excalidraw with rooms, persistence, and admin dashboard.
#
# Usage:
#   docker compose up -d --build       # canvas + dashboard
#
# Required env (put in .env beside this file):
#   ADMIN_API_KEY=<long-random-string>   # gate for /api/admin/* and dashboard
#   PUBLIC_BASE_URL=https://draw.proklov.dev   # what shareUrl values look like

services:
  canvas:
    build:
      context: .
      dockerfile: Dockerfile.canvas
    image: excalidraw-zephy-canvas:latest
    container_name: excalidraw-canvas
    ports:
      - "127.0.0.1:3000:3000"   # cloudflared talks to localhost; nothing public direct
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      DATA_DIR: "/app/data"
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY must be set in .env}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      ROOT_REDIRECT_URL: ${ROOT_REDIRECT_URL:-}
      SYNC_DEBUG: ${SYNC_DEBUG:-false}
      MCP_REQUIRE_AUTH: ${MCP_REQUIRE_AUTH:-true}
    volumes:
      - canvas-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - excalidraw-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: excalidraw-zephy-dashboard:latest
    container_name: excalidraw-dashboard
    ports:
      - "5000:5000"   # exposed via cloudflared at draw-admin.proklov.dev (behind CF Access — Google IdP, val Gmail only)
    environment:
      NODE_ENV: production
      PORT: "5000"
      HOST: "0.0.0.0"
      CANVAS_URL: "http://canvas:3000"
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY must be set in .env}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      MCP_INSTALL_TEMPLATE: ${MCP_INSTALL_TEMPLATE:-}
    depends_on:
      canvas:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - excalidraw-net

volumes:
  canvas-data:

networks:
  excalidraw-net:
    driver: bridge
